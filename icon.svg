<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 방패 그라디언트 — 네이비 → 보라 -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1f3a"/>
      <stop offset="50%" stop-color="#1a3560"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- 골드 테두리 그라디언트 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c860"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
    <!-- 80 흰색 영점 광채 -->
    <radialGradient id="zeroGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- 보라 꽃 그라디언트 -->
    <radialGradient id="flowerGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ec4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  
  <!-- 배경 (네이비) -->
  <rect width="512" height="512" fill="#020a18" rx="100"/>
  
  <!-- 방패 (메인) -->
  <path d="M 256,60 
           Q 130,80 100,140
           L 100,280
           Q 130,400 256,452
           Q 382,400 412,280
           L 412,140
           Q 382,80 256,60 Z" 
        fill="url(#shieldGrad)"
        stroke="url(#goldGrad)"
        stroke-width="4"/>
  
  <!-- 보라 꽃 (배경 글로우) -->
  <circle cx="256" cy="256" r="120" fill="url(#flowerGrad)" opacity="0.6"/>
  
  <!-- Flower of Life 6원 (장식) -->
  <g fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4">
    <circle cx="256" cy="190" r="50"/>
    <circle cx="256" cy="322" r="50"/>
    <circle cx="199" cy="223" r="50"/>
    <circle cx="313" cy="223" r="50"/>
    <circle cx="199" cy="289" r="50"/>
    <circle cx="313" cy="289" r="50"/>
    <circle cx="256" cy="256" r="50"/>
  </g>
  
  <!-- 흰색 80 (중앙, 큰 글자) -->
  <circle cx="256" cy="256" r="78" fill="url(#zeroGlow)" opacity="0.4"/>
  <text x="256" y="256" 
        text-anchor="middle" 
        dominant-baseline="central"
        font-family="Arial Black, sans-serif"
        font-size="120"
        font-weight="900"
        fill="#ffffff"
        style="filter: drop-shadow(0 0 20px rgba(255,255,255,0.6))">80</text>
  
  <!-- 하단 MUFE 라벨 -->
  <text x="256" y="395" 
        text-anchor="middle" 
        font-family="Arial, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#f0c860"
        letter-spacing="6">MUFE</text>
  
  <!-- 골드 라인 액센트 (양옆) -->
  <line x1="180" y1="395" x2="225" y2="395" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
  <line x1="287" y1="395" x2="332" y2="395" stroke="#d4a843" stroke-width="1.5" opacity="0.6"/>
</svg>
